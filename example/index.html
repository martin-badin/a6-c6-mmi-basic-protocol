<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Upload CSV</title>
  </head>
  <body>
    <input type="file" id="fileInput" accept=".csv" />
    <canvas id="canvas"></canvas>

    <script src="dist/bundle.js"></script>

    <script type="module">
      /**
       * Parses the CSV text and returns an array of lines that start with
       * "0x04", "0x31", or "0x39". It also removes quotes, "from," and "to,"
       * and replaces commas with spaces.
       *
       * @param {string} text - The CSV text to parse.
       * @returns {string[][]} An array of parsed lines from the CSV.
       */
      const parseCSV = (text) => {
        const lines = text.split("\n");

        return lines
          .slice(1)
          .map((line) =>
            line
              .replace(/"/g, "")
              .replace(/(from,|to,)/g, "")
              .replace(/,/g, " ")
              .trim(),
          )
          .map((line) => line.split(" "));
      };

      document
        .getElementById("fileInput")
        .addEventListener("change", (event) => {
          const file = event.target.files[0];
          if (!file) return;

          const reader = new FileReader();
          const canvas = document.getElementById("canvas");

          console.log("Selected file:", canvas);

          reader.onload = function (e) {
            parseCSV(e.target.result).forEach((frame, index) => {
              setTimeout(() => {
                const id = frame[0];
                if (id === "0x04") {
                  const command = new Command04(frame);
                  // Command 04 resets/defines display size -> clear and set background
                  command.render(canvas, { scale: 3 });
                  console.log(
                    "Processed Command 04 (display size) in frame:",
                    frame,
                  );
                } else if (id === "0x31") {
                  const command = new Command31(frame);

                  // draw pixel blocks (prefer external parser/renderer)
                  command.render(canvas, { scale: 3 });

                  console.log(
                    "Processed Command 31 (pixel blocks) in frame:",
                    frame,
                  );
                } else if (id === "0x39") {
                  const command = new Command39(frame);

                  // fill/clear rectangles
                  command.render(canvas, { scale: 3 });
                  console.log(
                    "Processed Command 39 (fill/clear rectangles) in frame:",
                    frame,
                  );
                } else if (id === "0x55") {
                  const command = new Command55(frame);

                  // fill/clear rectangles
                  command.render(canvas, { scale: 3 });
                  console.log(
                    "Processed Command 55 (brightness) in frame:",
                    frame,
                  );
                } else {
                  console.warn("Unknown command ID:", id, "in frame:", frame);
                }
              }, index * 50);
            });
          };

          reader.readAsText(file);
        });
    </script>
  </body>
</html>
